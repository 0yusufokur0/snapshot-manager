# Snapshot Manager Configuration
# ================================

# Snapshot storage directory
# Can be a local path or an external disk mount point
SNAPSHOT_DIR="/snapshots"

# Language (en = English, tr = Turkish)
LANGUAGE=en

# Maximum number of snapshots to keep (per type)
# 0 = unlimited (keep all snapshots)
# Note: Ignored if KEEP_* retention policies are active
MAX_SYSTEM_SNAPSHOTS=0
MAX_FULL_SNAPSHOTS=0

# Retention policy (keep policy)
# Keeps the latest snapshot from each period
# 0 = disabled (no retention for this period)
# Example: KEEP_DAILY=7 keeps one snapshot per day for the last 7 days
KEEP_DAILY=0
KEEP_WEEKLY=0
KEEP_MONTHLY=0

# Low priority I/O (true/false)
# true = runs with ionice idle + nice 19, won't slow down system
# false = runs at normal priority, completes faster
LOW_PRIORITY=true

# SHA256 integrity manifest (true/false)
# true = records hash of all files after snapshot creation
# false = no manifest generated (faster)
# Note: Manifest generation can take a long time on large systems
GENERATE_MANIFEST=false

# Snapshot types:
#   system = System files only (excludes /home/*)
#   full   = Everything including user files

# ================================
# Borg Archive Settings
# ================================

# Archive mode (none = rsync only, borg = rsync + borg archival)
# borg mode: each snapshot is also archived into a borg repo for
#   space-efficient long-term storage with chunk-level deduplication
# none mode: traditional rsync+hardlink only (no borg dependency)
ARCHIVE_MODE=borg

# Borg repository path (leave empty for SNAPSHOT_DIR/.borg-repo)
BORG_REPO=""

# Borg compression algorithm and level
# Recommended: zstd,3 (good balance of speed and compression)
# Options: none, lz4, zstd,N (1-22), zlib,N (0-9)
BORG_COMPRESSION="zstd,3"

# Borg retention policy (applied to borg archives)
# These control how many borg archives to keep per period
BORG_KEEP_DAILY=7
BORG_KEEP_WEEKLY=4
BORG_KEEP_MONTHLY=6

# Number of recent rsync snapshots to keep for GRUB restore
# Only used when ARCHIVE_MODE=borg (older snapshots are in borg)
# When ARCHIVE_MODE=none, the KEEP_*/MAX_* settings above are used instead
MAX_RECENT_RSYNC=3
